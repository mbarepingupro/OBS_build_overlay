<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Combo Bar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: 'Exo 2', sans-serif;
      width: 1280px;
      padding: 8px;
    }

    .panel {
      position: relative;
      background: linear-gradient(160deg, rgba(22,12,4,0.95) 0%, rgba(30,16,4,0.92) 100%);
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 14px 22px 12px;
      backdrop-filter: blur(8px);
      overflow: hidden;
      transition: border-color 0.5s, box-shadow 0.5s;
    }

    .panel.active {
      border-color: rgba(255,140,0,0.45);
      box-shadow: 0 0 40px rgba(255,120,0,0.14), inset 0 1px 0 rgba(255,200,100,0.10);
    }

    .panel.tier3 {
      border-color: rgba(255,75,0,0.65);
      box-shadow: 0 0 50px rgba(255,60,0,0.22), inset 0 1px 0 rgba(255,200,100,0.14);
      animation: tier3Pulse 2s ease-in-out infinite;
    }

    @keyframes tier3Pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(255,60,0,0.18), inset 0 1px 0 rgba(255,200,100,0.12); }
      50%       { box-shadow: 0 0 64px rgba(255,80,0,0.32), inset 0 1px 0 rgba(255,220,120,0.20); }
    }

    .tier-flash {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      pointer-events: none;
      opacity: 0;
    }
    .tier-flash.animate {
      animation: tierFlash 1s ease-out forwards;
    }
    @keyframes tierFlash {
      0%   { opacity: 1; box-shadow: inset 0 0 90px rgba(255,220,60,0.55); }
      100% { opacity: 0; box-shadow: inset 0 0 0px transparent; }
    }

    .idle-info {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: 46px;
      margin-bottom: 10px;
    }
    .active-info {
      display: flex;
      align-items: center;
      height: 46px;
      margin-bottom: 10px;
    }

    .panel.idle .idle-info   { display: flex; }
    .panel.idle .active-info { display: none; }

    .idle-icon {
      font-size: 24px;
      opacity: 0.55;
      flex-shrink: 0;
    }
    .idle-text {
      font-size: 17px;
      color: rgba(255,255,255,0.50);
      letter-spacing: 0.05em;
      font-style: italic;
    }

    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .section-title {
      flex-direction: row;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .vdivider {
      width: 1px;
      height: 34px;
      flex-shrink: 0;
      background: rgba(255,140,0,0.22);
      transition: background 0.5s;
    }
    .panel:not(.active):not(.tier3) .vdivider {
      background: rgba(255,255,255,0.12);
    }

    .sec-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,180,80,0.42);
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .title-icon {
      font-size: 26px;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(255,160,0,0.65));
    }
    .title-text {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: rgba(255,220,160,0.97);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255,160,0,0.45);
      white-space: nowrap;
    }

    .tier-badge {
      font-family: 'Cinzel', serif;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.10em;
      color: #ffb347;
      text-transform: uppercase;
      white-space: nowrap;
      transition: color 0.4s, text-shadow 0.4s;
    }
    .panel.tier3 .tier-badge {
      color: #ff7030;
      text-shadow: 0 0 14px rgba(255,80,0,0.65);
      animation: tier3BadgePulse 1.5s ease-in-out infinite;
    }
    @keyframes tier3BadgePulse {
      0%, 100% { text-shadow: 0 0 10px rgba(255,80,0,0.50); }
      50%       { text-shadow: 0 0 24px rgba(255,100,0,0.88); }
    }

    .mult-value {
      font-family: 'Cinzel', serif;
      font-size: 30px;
      font-weight: 600;
      color: #ffb347;
      letter-spacing: 0.04em;
      text-shadow: 0 0 16px rgba(255,160,0,0.55);
      line-height: 1;
      transition: color 0.4s, text-shadow 0.4s;
    }
    .panel.tier3 .mult-value {
      color: #ff6020;
      text-shadow: 0 0 22px rgba(255,80,0,0.75);
    }

    .progress-count {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,210,120,0.90);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .progress-sep {
      font-size: 15px;
      color: rgba(255,180,80,0.35);
      font-weight: 300;
    }

    .timer-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .timer-icon { font-size: 13px; opacity: 0.50; }
    .timer-value {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 600;
      color: rgba(255,200,100,0.85);
      letter-spacing: 0.10em;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }
    .timer-value.urgent {
      color: rgba(255,75,35,0.95);
      animation: timerUrgent 0.55s ease-in-out infinite;
    }
    @keyframes timerUrgent {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.38; }
    }

    .progress-track {
      height: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(255,140,0,0.10);
      transition: border-color 0.5s;
    }
    .panel.idle .progress-track {
      border-color: rgba(255,255,255,0.08);
    }

    .progress-fill {
      position: relative;
      height: 100%;
      background: linear-gradient(90deg, #c05000, #ff9020, #ffcc55);
      border-radius: 99px;
      transition: width 0.65s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 14px rgba(255,140,0,0.60);
      overflow: hidden;
    }
    .panel.tier3 .progress-fill {
      background: linear-gradient(90deg, #8a0000, #dd3800, #ff7820);
      box-shadow: 0 0 18px rgba(255,70,0,0.70);
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      animation: shimmer 2.2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { left: -60%; }
      100% { left: 130%; }
    }

    .offline-notice {
      display: none;
      font-size: 9px;
      color: rgba(255,100,100,0.6);
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.06em;
    }
    .offline-notice.visible { display: block; }

    .test-panel {
      margin-top: 8px;
      background: rgba(0,0,0,0.80);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .test-title {
      font-size: 8px; text-transform: uppercase; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.25); text-align: center; margin-bottom: 6px;
    }
    .test-row {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin-bottom: 4px; align-items: center;
    }
    .test-row:last-child { margin-bottom: 0; }
    .test-row-label {
      font-size: 8px; text-transform: uppercase; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.22); width: 100%;
    }
    .test-panel button {
      font-family: 'Exo 2', sans-serif; font-size: 9px; padding: 3px 9px;
      border-radius: 4px; border: 1px solid rgba(255,140,0,0.30);
      background: rgba(255,140,0,0.07); color: rgba(255,180,80,0.80);
      cursor: pointer; transition: background 0.12s;
    }
    .test-panel button:hover { background: rgba(255,140,0,0.18); color: #ffb347; }
    .test-row.t-reset button {
      border-color: rgba(100,200,255,0.30); background: rgba(100,200,255,0.05);
      color: rgba(140,210,255,0.85);
    }
    .test-row.t-reset button:hover { background: rgba(100,200,255,0.12); }
  </style>
</head>
<body>

<div class="panel idle" id="panel">

  <div class="tier-flash" id="tierFlash"></div>

  <!-- Idle state -->
  <div class="idle-info">
    <span class="idle-icon">⚡</span>
    <span class="idle-text" id="idleText">3 builds in 1 minute to activate the combo!</span>
  </div>

  <!-- Active state -->
  <div class="active-info">
    <div class="section section-title">
      <span class="title-icon" id="headerIcon">⚡</span>
      <span class="title-text">Build Combo</span>
    </div>
    <div class="vdivider"></div>
    <div class="section">
      <div class="sec-label">Tier</div>
      <div class="tier-badge" id="tierBadge">TIER 1</div>
    </div>
    <div class="vdivider"></div>
    <div class="section">
      <div class="sec-label">Multiplier</div>
      <div class="mult-value" id="multValue">2x</div>
    </div>
    <div class="vdivider"></div>
    <div class="section">
      <div class="sec-label">Progress</div>
      <div class="progress-count">
        <span id="progressCount">0</span><span class="progress-sep"> / </span><span id="progressGoal">10</span>
      </div>
    </div>
    <div class="vdivider"></div>
    <div class="section">
      <div class="sec-label">Remaining</div>
      <div class="timer-row">
        <span class="timer-icon">⏱</span>
        <span class="timer-value" id="timerValue">20:00</span>
      </div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="offline-notice" id="offlineNotice">⚠ disconnected from streamerbot</div>

</div>

<!-- Test panel (only visible at ?test in URL) -->
<div class="test-panel" id="testPanel" style="display:none">
  <div class="test-title">⚙ combo bar — test mode</div>
  <div class="test-row">
    <div class="test-row-label">Pre-activation builds (need 3 within 1 min)</div>
    <button onclick="testBuild(1,0)">Normal (+1)</button>
    <button onclick="testBuild(20,0)">Nat 20 (+2)</button>
    <button onclick="testBuild(1,100)">Crit (+5)</button>
    <button onclick="testForceActivate()">Force activate (3×)</button>
  </div>
  <div class="test-row">
    <div class="test-row-label">During combo</div>
    <button onclick="testBurst(5)">Burst ×5</button>
    <button onclick="testFillTier()">Fill tier</button>
  </div>
  <div class="test-row t-reset">
    <div class="test-row-label">Reset</div>
    <button onclick="handleComboReset()">combo_reset</button>
  </div>
</div>

<script>
  const WS_URL = "ws://127.0.0.1:8080/";

  // ── Tier config ────────────────────────────────────
  // To add a new tier: add a line here. No extra Streamerbot actions needed —
  // just make sure "Combo - Tier Reached" reads %value% and sets the multiplier.
  const TIERS = [
    { goal: 10, duration: 20 * 60, multiplier: "2", label: "TIER 1" },
    { goal: 20, duration: 15 * 60, multiplier: "3", label: "TIER 2" },
    { goal: 30, duration: 10 * 60, multiplier: "6", label: "TIER 3 🔥" },
  ];
  const MAX_TIER_IDX = TIERS.length - 1;

  // ── Streamerbot action IDs ─────────────────────────
  const ACTION_TIER_REACHED    = { id: "edd57dce-1d75-4c3d-96a5-5965528a9e4d", name: "Combo - Tier Reached" };
  const ACTION_RESET_MULTIPLIER = { id: "762a3430-9909-4057-8e83-8ab1c1b79fcf", name: "Combo - Reset Multiplier" };

  const ACTIVATION_BUILDS = 3;
  const ACTIVATION_WINDOW = 60 * 1000;

  let active        = false;
  let tierIdx       = 0;
  let comboProgress = 0;
  let secondsLeft   = 0;
  let timerInterval = null;
  let recentBuilds  = [];

  // ── WebSocket ──────────────────────────────────────
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      document.getElementById("offlineNotice").classList.remove("visible");
      ws.send(JSON.stringify({
        request: "Subscribe",
        id: "combo-bar",
        events: { General: ["Custom"] }
      }));
    };

    ws.onmessage = ({ data }) => {
      try {
        const msg = JSON.parse(data);
        const d   = msg?.data;
        if (!d) return;
        if (d.event === "village_build") handleBuildEvent(parseInt(d.userRoll)||0, parseInt(d.critChance)||0);
        if (d.event === "combo_reset")   handleComboReset();
      } catch {}
    };

    ws.onclose = () => {
      document.getElementById("offlineNotice").classList.add("visible");
      setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
  }

  // ── Build event ────────────────────────────────────
  function handleBuildEvent(userRoll, critChance) {
    if (!active) {
      const now = Date.now();
      recentBuilds.push(now);
      recentBuilds = recentBuilds.filter(t => now - t <= ACTIVATION_WINDOW);

      if (recentBuilds.length >= ACTIVATION_BUILDS) {
        recentBuilds = [];
        activateCombo();
      } else {
        updateIdleText();
      }
      return;
    }

    const increment = critChance === 100 ? 5
                    : userRoll === 20    ? 2
                    : 1;

    comboProgress += increment;

    if (comboProgress >= TIERS[tierIdx].goal) {
      handleTierComplete();
    } else {
      render();
    }
  }

  // ── Activate ───────────────────────────────────────
  function activateCombo() {
    active        = true;
    tierIdx       = 0;
    comboProgress = 0;
    startCountdown(TIERS[0].duration);
    doAction(ACTION_TIER_REACHED, TIERS[0].multiplier); // set multiplier immediately
    render();
  }

  // ── Tier complete ──────────────────────────────────
  function handleTierComplete() {
    flashPanel();

    const overflow = comboProgress - TIERS[tierIdx].goal;
    if (tierIdx < MAX_TIER_IDX) tierIdx++;

    comboProgress = Math.max(0, overflow);
    startCountdown(TIERS[tierIdx].duration);
    doAction(ACTION_TIER_REACHED, TIERS[tierIdx].multiplier); // set new multiplier
    render();
  }

  // ── Countdown ──────────────────────────────────────
  function startCountdown(seconds) {
    clearInterval(timerInterval);
    secondsLeft   = seconds;
    timerInterval = setInterval(tickTimer, 1000);
  }

  function tickTimer() {
    if (!active) { clearInterval(timerInterval); return; }
    secondsLeft = Math.max(0, secondsLeft - 1);
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      doAction(ACTION_RESET_MULTIPLIER, "1"); // reset multiplier to 1
      handleComboReset();
    }
  }

  // ── Reset ──────────────────────────────────────────
  function handleComboReset() {
    clearInterval(timerInterval);
    active        = false;
    tierIdx       = 0;
    comboProgress = 0;
    secondsLeft   = 0;
    recentBuilds  = [];
    render();
  }

  // ── WS helpers ─────────────────────────────────────
  function sendWS(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }

  // DoAction with id at top level — correct format for Streamerbot 1.0.4
  function doAction(action, value) {
    sendWS({
      request: "DoAction",
      id: "combo-action",
      action: { id: action.id, name: action.name },
      args: { value: String(value) }
    });
  }

  // ── Panel flash ────────────────────────────────────
  function flashPanel() {
    const el = document.getElementById("tierFlash");
    el.classList.remove("animate");
    void el.offsetWidth;
    el.classList.add("animate");
    setTimeout(() => el.classList.remove("animate"), 1000);
  }

  // ── Render ─────────────────────────────────────────
  function render() {
    const panel = document.getElementById("panel");
    const tier  = TIERS[tierIdx];
    const pct   = active ? Math.min(100, (comboProgress / tier.goal) * 100) : 0;

    panel.classList.toggle("idle",   !active);
    panel.classList.toggle("active", active && tierIdx < MAX_TIER_IDX);
    panel.classList.toggle("tier3",  active && tierIdx >= MAX_TIER_IDX);

    document.getElementById("progressFill").style.width = pct + "%";

    if (!active) { updateIdleText(); return; }

    document.getElementById("headerIcon").textContent    = tierIdx >= MAX_TIER_IDX ? "🔥" : "⚡";
    document.getElementById("tierBadge").textContent     = tier.label;
    document.getElementById("multValue").textContent     = tier.multiplier + "x";
    document.getElementById("progressCount").textContent = comboProgress;
    document.getElementById("progressGoal").textContent  = tier.goal;
    updateTimerDisplay();
  }

  function updateIdleText() {
    const n  = recentBuilds.length;
    const el = document.getElementById("idleText");
    el.textContent = n === 0
      ? "3 builds in 1 minute to activate the combo!"
      : `${n} / 3 builds — keep going!`;
  }

  function updateTimerDisplay() {
    const el = document.getElementById("timerValue");
    if (!el || !active) return;
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    el.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    el.classList.toggle("urgent", secondsLeft <= 30 && secondsLeft > 0);
  }

  render();
  connect();

  // ── Test helpers ───────────────────────────────────
  if (new URLSearchParams(window.location.search).has("test")) {
    document.getElementById("testPanel").style.display = "block";
  }

  function testBuild(userRoll, critChance) { handleBuildEvent(userRoll, critChance); }
  function testBurst(n) { for (let i = 0; i < n; i++) handleBuildEvent(1, 0); }
  function testFillTier() {
    if (!active) return;
    const needed = TIERS[tierIdx].goal - comboProgress;
    for (let i = 0; i < needed; i++) handleBuildEvent(1, 0);
  }
  function testForceActivate() {
    const now = Date.now();
    recentBuilds = [now - 4000, now - 2000];
    handleBuildEvent(1, 0);
  }
</script>
</body>
</html>
